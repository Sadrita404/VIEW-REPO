    <style>
         :root {
        --bg0: #0a0a0c;
        --bg1: #0f0f12;
        --bg2: #161619;
        --bg3: #1c1c21;
        --bg4: #252529;
        --hover: #2a2a30;
        --border: #2d2d35;
        --border2: #222228;
        --t0: #f0f0f2;
        --t1: #c8c8cd;
        --t2: #8b8b95;
        --t3: #5c5c66;
        --acc: hsl(151, 63%, 41%);
        --acc2: #20c48b;
        --accbg: rgba(0, 255, 157, 0.08);
        --blue: #4d9fff;
        --purple: #a78bfa;
        --orange: #ff9f43;
        --red: #ff5f5f;
        --cyan: #22d3ee;
        --pink: #ec4899;
        --green: #22c55e;
      }
      .light {
        --bg0: #f8eac0;
        --bg1: #f8eac0;
        --bg2: #f8eac0;
        --bg3: #f8eac0;
        --bg4: #f8eac0;
        --hover: #f8eac0;
        --border: #000000;
        --border2: #e8eaed;
        --t0: #1a1a1a;
        --t1: #3c3c3c;
        --t2: #6c6c6c;
        --t3: #9c9c9c;
        --acc: #0000a8;
        --acc2: #000a8f;
        --accbg: rgba(0, 168, 107, 0.08);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "JetBrains Mono", monospace;
        background: var(--bg0);
        color: var(--t0);
        height: 100vh;
        height: 100dvh;
        min-height: 100vh;
        min-height: 100dvh;
        overflow: hidden;
      }
      .app {
        display: flex;
        height: 100vh;
        height: 100dvh;
        min-height: 100vh;
        min-height: 100dvh;
        flex-direction: column;
      }
      .topbar {
        min-height: 48px;
        background: var(--bg1);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 16px;
        gap: 16px;
        flex-shrink: 0;
        position: relative;
        z-index: 120;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
      }
      .logo-mark {
        width: 28px;
        height: 28px;
        background: linear-gradient(135deg, var(--acc), var(--cyan));
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--bg0);
      }
      .logo-text {
        font-size: 14px;
        font-weight: 700;
        color: var(--acc);
      }
      .icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        line-height: 0;
        color: currentColor;
      }
      .icon svg {
        display: block;
        width: 100%;
        height: 100%;
      }
      .icon-s {
        width: 12px;
        height: 12px;
      }
      .icon-m {
        width: 14px;
        height: 14px;
      }
      .icon-l {
        width: 16px;
        height: 16px;
      }
      .icon-xl {
        width: 20px;
        height: 20px;
      }
      .icon-xxl {
        width: 48px;
        height: 48px;
      }
      .status-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 999px;
        flex-shrink: 0;
      }
      .repo-input-group {
        display: flex;
        gap: 8px;
        flex: 1;
        max-width: 860px;
        min-width: 0;
      }
      .repo-input-group > * {
        min-width: 0;
      }
      .repo-input {
        flex: 1;
        padding: 6px 12px;
        background: var(--bg0);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--t0);
        font-family: inherit;
        font-size: 11px;
        min-width: 0;
      }
      .repo-input-group > .repo-input:first-child {
        min-width: 220px;
      }
      .repo-input-group > .top-btn,
      .repo-input-group > .refresh-btn,
      .repo-input-group > .reset-btn,
      .auth-select,
      .private-key-btn {
        flex-shrink: 0;
      }
      .repo-input:focus {
        outline: none;
        border-color: var(--acc);
      }
      .topbar-actions {
        display: flex;
        gap: 6px;
        margin-left: auto;
        flex-wrap: wrap;
      }
      .top-btn {
        padding: 6px 12px;
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--t1);
        font-family: inherit;
        font-size: 10px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        white-space: nowrap;
        min-height: 32px;
        touch-action: manipulation;
      }
      .top-btn:hover {
        background: var(--bg4);
        border-color: var(--acc);
        color: var(--acc);
      }
      .top-btn.primary {
        background: var(--acc);
        color: var(--bg0);
        border-color: var(--acc);
      }
      .top-btn.primary:hover {
        background: var(--acc2);
      }
      .top-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .main {
        display: flex;
        flex: 1;
        overflow: hidden;
        min-height: 0;
        position: relative;
      }
      .sidebar {
        width: 260px;
        min-width: 180px;
        max-width: 400px;
        background: var(--bg1);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        position: relative;
        min-height: 0;
      }
      .resize-handle {
        position: absolute;
        top: 0;
        right: -4px;
        width: 8px;
        height: 100%;
        cursor: col-resize;
        z-index: 10;
      }
      .resize-handle:hover {
        background: var(--acc);
        opacity: 0.3;
      }
      .sidebar-section {
        padding: 12px;
        border-bottom: 1px solid var(--border);
      }
      .sidebar-title {
        font-size: 9px;
        font-weight: 600;
        color: var(--t3);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 10px;
      }
      .sidebar-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 8px;
      }
      .sidebar-scroll::-webkit-scrollbar {
        width: 6px;
      }
      .sidebar-scroll::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }
      .view-modes {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .view-mode {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 11px;
        color: var(--t1);
      }
      .view-mode:hover {
        background: var(--hover);
      }
      .view-mode.active {
        background: var(--accbg);
        color: var(--acc);
      }
      .view-mode-icon {
        color: currentColor;
      }

       .view-mode-badge {
        margin-left: auto;
        font-size: 9px;
        background: var(--red);
        color: white;
        padding: 2px 6px;
        border-radius: 8px;
      }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 6px;
      }
      .stat-card {
        background: var(--bg0);
        border: 1px solid var(--border2);
        border-radius: 6px;
        padding: 10px;
        text-align: center;
      }
      .stat-value {
        font-size: 18px;
        font-weight: 700;
        color: var(--acc);
      }
      .stat-label {
        font-size: 8px;
        color: var(--t3);
        text-transform: uppercase;
        margin-top: 2px;
      }
      .stat-card.warn .stat-value {
        color: var(--orange);
      }
      .health-score {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px;
        background: var(--bg0);
        border-radius: 8px;
      }
      .health-ring {
        width: 48px;
        height: 48px;
        position: relative;
      }
      .health-ring svg {
        transform: rotate(-90deg);
      }
      .health-ring-value {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        font-weight: 700;
      }
      .health-info {
        flex: 1;
      }
      .health-grade {
        font-size: 16px;
        font-weight: 700;
      }
      .health-label {
        font-size: 9px;
        color: var(--t3);
      }
      .tree-folder {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 5px 8px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 11px;
        color: var(--t1);
      }
      .tree-folder:hover {
        background: var(--hover);
      }
      .tree-folder.filtered {
        background: var(--accbg);
        color: var(--acc);
      }
      .tree-toggle {
        width: 12px;
        font-size: 8px;
        color: var(--t3);
        transition: transform 0.15s;
      }
      .tree-toggle.open {
        transform: rotate(90deg);
      }
      .tree-name {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .tree-count {
        font-size: 9px;
        color: var(--t3);
        background: var(--bg3);
        padding: 1px 5px;
        border-radius: 8px;
      }
      .tree-children {
        margin-left: 16px;
      }
      .tree-file {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 8px;
        margin-left: 18px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 10px;
        color: var(--t2);
      }
      .tree-file:hover {
        background: var(--hover);
        color: var(--t0);
      }
      .tree-file.active {
        background: var(--accbg);
        color: var(--acc);
      }
      .canvas-area {
        flex: 1;
        position: relative;
        background: var(--bg0);
        overflow: hidden;
        min-width: 0;
      }
      .canvas-area svg {
        width: 100%;
        height: 100%;
        display: block;
      }
      .canvas-toolbar {
        position: absolute;
        top: 12px;
        left: 12px;
        display: flex;
        gap: 4px;
        z-index: 50;
      }
      .canvas-info {
        position: absolute;
        bottom: 12px;
        left: 12px;
        display: flex;
        gap: 8px;
        z-index: 50;
      }
      .info-chip {
        padding: 6px 10px;
        background: var(--bg1);
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 10px;
        color: var(--t2);
      }
      .info-chip strong {
        color: var(--acc);
      }
      .tool-btn {
        width: 32px;
        height: 32px;
        background: var(--bg1);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--t2);
        font-size: 13px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: manipulation;
      }
      .tool-btn:hover {
        background: var(--bg2);
        color: var(--t0);
        border-color: var(--acc);
      }
      .legend {
        position: absolute;
        top: 12px;
        right: 12px;
        background: var(--bg1);
        border: 1px solid var(--border);
        border-radius: 8px;
        z-index: 50;
        min-width: 140px;
        max-height: 300px;
        overflow-y: auto;
        transition: all 0.2s;
      }
      .legend.collapsed {
        padding: 8px;
        min-width: auto;
        max-height: none;
        overflow: hidden;
      }
      .legend.collapsed .legend-content {
        display: none;
      }
      .legend-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        cursor: pointer;
      }
      .legend-header:hover {
        background: var(--hover);
        border-radius: 6px;
      }
      .legend-toggle {
        font-size: 10px;
        color: var(--t3);
        transition: transform 0.2s;
      }
      .legend.collapsed .legend-toggle {
        transform: rotate(-90deg);
      }
      .legend-content {
        padding: 0 12px 12px;
      }
      .legend::-webkit-scrollbar {
        width: 4px;
      }
      .legend::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }
      .legend-title {
        font-size: 9px;
        font-weight: 600;
        color: var(--t3);
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 10px;
        color: var(--t2);
        margin-bottom: 4px;
        cursor: pointer;
        padding: 2px 4px;
        border-radius: 4px;
      }
      .legend-item:hover {
        background: var(--hover);
      }
      .legend-item.active {
        background: var(--accbg);
        color: var(--acc);
      }
      .legend-color {
        width: 12px;
        height: 12px;
        border-radius: 3px;
        flex-shrink: 0;
      }
      .right-panel {
        width: 360px;
        min-width: 280px;
        max-width: 500px;
        background: var(--bg1);
        border-left: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        position: relative;
        min-height: 0;
      }
      .right-panel .resize-handle {
        right: auto;
        left: -4px;
      }
      .panel-tabs {
        display: flex;
        border-bottom: 1px solid var(--border);
        background: var(--bg2);
      }
      .panel-tab {
        flex: 1;
        padding: 8px;
        background: transparent;
        border: none;
        border-bottom: 2px solid transparent;
        color: var(--t3);
        font-family: inherit;
        font-size: 9px;
        font-weight: 600;
        cursor: pointer;
      }
      .panel-tab:hover {
        color: var(--t1);
      }
      .panel-tab.active {
        color: var(--acc);
        border-bottom-color: var(--acc);
      }
      .panel-content {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
      }
      .panel-content::-webkit-scrollbar {
        width: 6px;
      }
      .panel-content::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }
      .card {
        background: var(--bg0);
        border: 1px solid var(--border2);
        border-radius: 8px;
        margin-bottom: 8px;
        overflow: hidden;
      }
      .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 12px;
        cursor: pointer;
      }
      .card-header:hover {
        background: var(--hover);
      }
      .card-title {
        font-size: 11px;
        color: var(--t0);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .card-toggle {
        font-size: 8px;
        color: var(--t3);
        transition: transform 0.15s;
      }
      .card-toggle.open {
        transform: rotate(90deg);
      }
      .card-body {
        padding: 12px;
        border-top: 1px solid var(--border2);
        background: var(--bg2);
      }
      .badge {
        font-size: 9px;
        font-weight: 600;
        padding: 2px 6px;
        border-radius: 6px;
      }
      .badge-default {
        background: var(--bg3);
        color: var(--t2);
      }
      .badge-success {
        background: rgba(34, 197, 94, 0.2);
        color: var(--green);
      }
      .badge-warning {
        background: rgba(255, 159, 67, 0.2);
        color: var(--orange);
      }
      .badge-danger {
        background: rgba(255, 95, 95, 0.2);
        color: var(--red);
      }
      .badge-info {
        background: rgba(77, 159, 255, 0.2);
        color: var(--blue);
      }
      .progress-bar {
        height: 6px;
        background: var(--bg3);
        border-radius: 3px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        border-radius: 3px;
      }
      .owner-bar {
        display: flex;
        height: 8px;
        border-radius: 4px;
        overflow: hidden;
        margin: 8px 0;
      }
      .owner-segment {
        height: 100%;
      }
      .owner-list {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .owner-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 10px;
      }
      .owner-avatar {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 9px;
        color: white;
      }
      .owner-name {
        flex: 1;
        color: var(--t1);
      }
      .owner-percent {
        color: var(--t3);
      }
      .pattern-item {
        padding: 12px;
        background: linear-gradient(
          180deg,
          rgba(34, 197, 94, 0.08) 0%,
          var(--bg0) 55%
        );
        border-radius: 8px;
        margin-bottom: 8px;
        border: 1px solid rgba(34, 197, 94, 0.32);
        transition: transform 0.15s ease, border-color 0.15s ease,
          box-shadow 0.15s ease;
      }
      .pattern-item:hover {
