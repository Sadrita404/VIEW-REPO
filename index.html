    <style>
      :root {
        --bg0: #0a0a0c;
        --bg1: #0f0f12;
        --bg2: #161619;
        --bg3: #1c1c21;
        --bg4: #252529;
        --hover: #2a2a30;
        --border: #2d2d35;
        --border2: #222228;
        --t0: #f0f0f2;
        --t1: #c8c8cd;
        --t2: #8b8b95;
        --t3: #5c5c66;
        --acc: hsl(151, 63%, 41%);
        --acc2: #20c48b;
        --accbg: rgba(0, 255, 157, 0.08);
        --blue: #4d9fff;
        --purple: #a78bfa;
        --orange: #ff9f43;
        --red: #ff5f5f;
        --cyan: #22d3ee;
        --pink: #ec4899;
        --green: #22c55e;
      }
      .light {
        --bg0: #f8eac0;
        --bg1: #f8eac0;
        --bg2: #f8eac0;
        --bg3: #f8eac0;
        --bg4: #f8eac0;
        --hover: #f8eac0;
        --border: #000000;
        --border2: #e8eaed;
        --t0: #1a1a1a;
        --t1: #3c3c3c;
        --t2: #6c6c6c;
        --t3: #9c9c9c;
        --acc: #0000a8;
        --acc2: #000a8f;
        --accbg: rgba(0, 168, 107, 0.08);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "JetBrains Mono", monospace;
        background: var(--bg0);
        color: var(--t0);
        height: 100vh;
        height: 100dvh;
        min-height: 100vh;
        min-height: 100dvh;
        overflow: hidden;
      }
      .app {
        display: flex;
        height: 100vh;
        height: 100dvh;
        min-height: 100vh;
        min-height: 100dvh;
        flex-direction: column;
      }
      .topbar {
        min-height: 48px;
        background: var(--bg1);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 16px;
        gap: 16px;
        flex-shrink: 0;
        position: relative;
        z-index: 120;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
      }
      .logo-mark {
        width: 28px;
        height: 28px;
        background: linear-gradient(135deg, var(--acc), var(--cyan));
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--bg0);
      }
      .logo-text {
        font-size: 14px;
        font-weight: 700;
        color: var(--acc);
      }
      .icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        line-height: 0;
        color: currentColor;
      }
      .icon svg {
        display: block;
        width: 100%;
        height: 100%;
      }
      .icon-s {
        width: 12px;
        height: 12px;
      }
      .icon-m {
        width: 14px;
        height: 14px;
      }
      .icon-l {
        width: 16px;
        height: 16px;
      }
      .icon-xl {
        width: 20px;
        height: 20px;
      }
      .icon-xxl {
        width: 48px;
        height: 48px;
      }
      .status-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 999px;
        flex-shrink: 0;
      }
      .repo-input-group {
        display: flex;
        gap: 8px;
        flex: 1;
        max-width: 860px;
        min-width: 0;
      }
      .repo-input-group > * {
        min-width: 0;
      }
      .repo-input {
        flex: 1;
        padding: 6px 12px;
        background: var(--bg0);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--t0);
        font-family: inherit;
        font-size: 11px;
        min-width: 0;
      }
      .repo-input-group > .repo-input:first-child {
        min-width: 220px;
      }
      .repo-input-group > .top-btn,
      .repo-input-group > .refresh-btn,
      .repo-input-group > .reset-btn,
      .auth-select,
      .private-key-btn {
        flex-shrink: 0;
      }
      .repo-input:focus {
        outline: none;
        border-color: var(--acc);
      }
      .topbar-actions {
        display: flex;
        gap: 6px;
        margin-left: auto;
        flex-wrap: wrap;
      }
      .top-btn {
        padding: 6px 12px;
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--t1);
        font-family: inherit;
        font-size: 10px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        white-space: nowrap;
        min-height: 32px;
        touch-action: manipulation;
      }
      .top-btn:hover {
        background: var(--bg4);
        border-color: var(--acc);
        color: var(--acc);
      }
      .top-btn.primary {
        background: var(--acc);
        color: var(--bg0);
        border-color: var(--acc);
      }
      .top-btn.primary:hover {
        background: var(--acc2);
      }
      .top-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .main {
        display: flex;
        flex: 1;
        overflow: hidden;
        min-height: 0;
        position: relative;
      }
      .sidebar {
        width: 260px;
        min-width: 180px;
        max-width: 400px;
        background: var(--bg1);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        position: relative;
        min-height: 0;
      }
      .resize-handle {
        position: absolute;
        top: 0;
        right: -4px;
        width: 8px;
        height: 100%;
        cursor: col-resize;
        z-index: 10;
      }
      .resize-handle:hover {
        background: var(--acc);
        opacity: 0.3;
      }
      .sidebar-section {
        padding: 12px;
        border-bottom: 1px solid var(--border);
      }
      .sidebar-title {
        font-size: 9px;
        font-weight: 600;
        color: var(--t3);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 10px;
      }
      .sidebar-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 8px;
      }
      .sidebar-scroll::-webkit-scrollbar {
        width: 6px;
      }
      .sidebar-scroll::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }
      .view-modes {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .view-mode {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 11px;
        color: var(--t1);
      }
      .view-mode:hover {
        background: var(--hover);
      }
      .view-mode.active {
        background: var(--accbg);
        color: var(--acc);
      }
      .view-mode-icon {
        color: currentColor;
      }
      .view-mode-badge {
        margin-left: auto;
        font-size: 9px;
        background: var(--red);
        color: white;
        padding: 2px 6px;
        border-radius: 8px;
      }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 6px;
      }
      .stat-card {
        background: var(--bg0);
        border: 1px solid var(--border2);
        border-radius: 6px;
        padding: 10px;
        text-align: center;
      }
      .stat-value {
        font-size: 18px;
        font-weight: 700;
        color: var(--acc);
      }
      .stat-label {
        font-size: 8px;
        color: var(--t3);
        text-transform: uppercase;
        margin-top: 2px;
      }
      .stat-card.warn .stat-value {
        color: var(--orange);
      }
      .health-score {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px;
        background: var(--bg0);
        border-radius: 8px;
      }
      .health-ring {
        width: 48px;
        height: 48px;
        position: relative;
      }
      .health-ring svg {
        transform: rotate(-90deg);
      }
      .health-ring-value {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        font-weight: 700;
      }
      .health-info {
        flex: 1;
      }
      .health-grade {
        font-size: 16px;
        font-weight: 700;
      }
      .health-label {
        font-size: 9px;
        color: var(--t3);
      }
      .tree-folder {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 5px 8px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 11px;
        color: var(--t1);
      }
      .tree-folder:hover {
        background: var(--hover);
      }
      .tree-folder.filtered {
        background: var(--accbg);
        color: var(--acc);
      }
      .tree-toggle {
        width: 12px;
        font-size: 8px;
        color: var(--t3);
        transition: transform 0.15s;
      }
      .tree-toggle.open {
        transform: rotate(90deg);
      }
      .tree-name {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .tree-count {
        font-size: 9px;
        color: var(--t3);
        background: var(--bg3);
        padding: 1px 5px;
        border-radius: 8px;
      }
      .tree-children {
        margin-left: 16px;
      }
      .tree-file {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 8px;
        margin-left: 18px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 10px;
        color: var(--t2);
      }
      .tree-file:hover {
        background: var(--hover);
        color: var(--t0);
      }
      .tree-file.active {
        background: var(--accbg);
        color: var(--acc);
      }
      .canvas-area {
        flex: 1;
        position: relative;
        background: var(--bg0);
        overflow: hidden;
        min-width: 0;
      }
      .canvas-area svg {
        width: 100%;
        height: 100%;
        display: block;
      }
      .canvas-toolbar {
        position: absolute;
        top: 12px;
        left: 12px;
        display: flex;
        gap: 4px;
        z-index: 50;
      }
      .canvas-info {
        position: absolute;
        bottom: 12px;
        left: 12px;
        display: flex;
        gap: 8px;
        z-index: 50;
      }
      .info-chip {
        padding: 6px 10px;
        background: var(--bg1);
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 10px;
        color: var(--t2);
      }
      .info-chip strong {
        color: var(--acc);
      }
      .tool-btn {
        width: 32px;
        height: 32px;
        background: var(--bg1);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--t2);
        font-size: 13px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: manipulation;
      }
      .tool-btn:hover {
        background: var(--bg2);
        color: var(--t0);
        border-color: var(--acc);
      }
      .legend {
        position: absolute;
        top: 12px;
        right: 12px;
        background: var(--bg1);
        border: 1px solid var(--border);
        border-radius: 8px;
        z-index: 50;
        min-width: 140px;
        max-height: 300px;
        overflow-y: auto;
        transition: all 0.2s;
      }
      .legend.collapsed {
        padding: 8px;
        min-width: auto;
        max-height: none;
        overflow: hidden;
      }
      .legend.collapsed .legend-content {
        display: none;
      }
      .legend-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        cursor: pointer;
      }
      .legend-header:hover {
        background: var(--hover);
        border-radius: 6px;
      }
      .legend-toggle {
        font-size: 10px;
        color: var(--t3);
        transition: transform 0.2s;
      }
      .legend.collapsed .legend-toggle {
        transform: rotate(-90deg);
      }
      .legend-content {
        padding: 0 12px 12px;
      }
      .legend::-webkit-scrollbar {
        width: 4px;
      }
      .legend::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }
      .legend-title {
        font-size: 9px;
        font-weight: 600;
        color: var(--t3);
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 10px;
        color: var(--t2);
        margin-bottom: 4px;
        cursor: pointer;
        padding: 2px 4px;
        border-radius: 4px;
      }
      .legend-item:hover {
        background: var(--hover);
      }
      .legend-item.active {
        background: var(--accbg);
        color: var(--acc);
      }
      .legend-color {
        width: 12px;
        height: 12px;
        border-radius: 3px;
        flex-shrink: 0;
      }
      .right-panel {
        width: 360px;
        min-width: 280px;
        max-width: 500px;
        background: var(--bg1);
        border-left: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        position: relative;
        min-height: 0;
      }
      .right-panel .resize-handle {
        right: auto;
        left: -4px;
      }
      .panel-tabs {
        display: flex;
        border-bottom: 1px solid var(--border);
        background: var(--bg2);
      }
      .panel-tab {
        flex: 1;
        padding: 8px;
        background: transparent;
        border: none;
        border-bottom: 2px solid transparent;
        color: var(--t3);
        font-family: inherit;
        font-size: 9px;
        font-weight: 600;
        cursor: pointer;
      }
      .panel-tab:hover {
        color: var(--t1);
      }
      .panel-tab.active {
        color: var(--acc);
        border-bottom-color: var(--acc);
      }
      .panel-content {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
      }
      .panel-content::-webkit-scrollbar {
        width: 6px;
      }
      .panel-content::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }
      .card {
        background: var(--bg0);
        border: 1px solid var(--border2);
        border-radius: 8px;
        margin-bottom: 8px;
        overflow: hidden;
      }
      .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 12px;
        cursor: pointer;
      }
      .card-header:hover {
        background: var(--hover);
      }
      .card-title {
        font-size: 11px;
        color: var(--t0);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .card-toggle {
        font-size: 8px;
        color: var(--t3);
        transition: transform 0.15s;
      }
      .card-toggle.open {
        transform: rotate(90deg);
      }
      .card-body {
        padding: 12px;
        border-top: 1px solid var(--border2);
        background: var(--bg2);
      }
      .badge {
        font-size: 9px;
        font-weight: 600;
        padding: 2px 6px;
        border-radius: 6px;
      }
      .badge-default {
        background: var(--bg3);
        color: var(--t2);
      }
      .badge-success {
        background: rgba(34, 197, 94, 0.2);
        color: var(--green);
      }
      .badge-warning {
        background: rgba(255, 159, 67, 0.2);
        color: var(--orange);
      }
      .badge-danger {
        background: rgba(255, 95, 95, 0.2);
        color: var(--red);
      }
      .badge-info {
        background: rgba(77, 159, 255, 0.2);
        color: var(--blue);
      }
      .progress-bar {
        height: 6px;
        background: var(--bg3);
        border-radius: 3px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        border-radius: 3px;
      }
      .owner-bar {
        display: flex;
        height: 8px;
        border-radius: 4px;
        overflow: hidden;
        margin: 8px 0;
      }
      .owner-segment {
        height: 100%;
      }
      .owner-list {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .owner-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 10px;
      }
      .owner-avatar {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 9px;
        color: white;
      }
      .owner-name {
        flex: 1;
        color: var(--t1);
      }
      .owner-percent {
        color: var(--t3);
      }
      .pattern-item {
        padding: 12px;
        background: linear-gradient(
          180deg,
          rgba(34, 197, 94, 0.08) 0%,
          var(--bg0) 55%
        );
        border-radius: 8px;
        margin-bottom: 8px;
        border: 1px solid rgba(34, 197, 94, 0.32);
        transition: transform 0.15s ease, border-color 0.15s ease,
          box-shadow 0.15s ease;
      }
      .pattern-item:hover {

          } catch (e) {
            console.error("JWT generation failed:", e);
            return null;
          }
        },

        getRepoInstallation: function (owner, repo) {
          var jwt = this.generateJWT();
          if (!jwt) return Promise.reject(new Error("Failed to generate JWT"));
          return this.request(
            buildGitHubApiUrl(["repos", owner, repo, "installation"]),
            {
              headers: {
                Accept: "application/vnd.github.v3+json",
                Authorization: "Bearer " + jwt,
              },
            },
            {
              401: "Invalid App credentials",
              404: "This GitHub App is not installed on the selected repository",
            }
          );
        },

        // Get installation access token
        getInstallationToken: function (installationId) {
          var self = this;
          var jwt = this.generateJWT();
          if (!jwt) return Promise.reject(new Error("Failed to generate JWT"));
          return this.request(
            buildGitHubApiUrl([
              "app",
              "installations",
              String(installationId),
              "access_tokens",
            ]),
            {
              method: "POST",
              headers: {
                Accept: "application/vnd.github.v3+json",
                Authorization: "Bearer " + jwt,
              },
            },
            { 401: "Invalid App credentials", 404: "Installation not found" }
          ).then(function (data) {
            self.installationToken = data.token;
            self.installationTokenExpiry = new Date(data.expires_at).getTime();
            self.token = data.token; // Use installation token for API calls
            return data.token;
          });
        },

        // Authenticate with GitHub App for a specific repo
        authenticateApp: function (owner, repo) {
          var self = this;
          // Check if we have a valid installation token
          if (
            this.installationToken &&
            this.installationTokenExpiry &&
            Date.now() < this.installationTokenExpiry - 60000
          ) {
            this.token = this.installationToken;
            return Promise.resolve(this.installationToken);
          }
          return this.getRepoInstallation(owner, repo).then(function (
            installation
          ) {
            if (!installation || !installation.id) {
              throw new Error("No installation found for this repository");
            }
            return self.getInstallationToken(installation.id);
          });
        },

        request: function (url, options, errorMap) {
          var self = this;
          var h = Object.assign(
            { Accept: "application/vnd.github.v3+json" },
            options && options.headers ? options.headers : {}
          );
          if (this.token && !h.Authorization)
            h.Authorization = "Bearer " + this.token;
          var controller = new AbortController();
          var timeoutId = setTimeout(function () {
            controller.abort();
          }, this.requestTimeoutMs);
          var requestOptions = Object.assign({}, options || {}, {
            headers: h,
            signal: controller.signal,
          });
          return fetch(url, requestOptions)
            .then(function (r) {
              // Track rate limit from headers
              var rem = r.headers.get("x-ratelimit-remaining");
              var lim = r.headers.get("x-ratelimit-limit");
              var rst = r.headers.get("x-ratelimit-reset");
              if (rem !== null) self.rateLimit.remaining = parseInt(rem, 10);
              if (lim !== null) self.rateLimit.limit = parseInt(lim, 10);
              if (rst !== null) self.rateLimit.reset = parseInt(rst, 10);
              if (!r.ok) {
                throw new Error(
                  errorMap && errorMap[r.status]
                    ? errorMap[r.status]
                    : r.status === 401
                    ? "Invalid token"
                    : r.status === 403
                    ? "Rate limited - add a GitHub token for 5000 req/hour"
                    : r.status === 404
                    ? "Repository not found"
                    : r.status === 429
                    ? "Rate limited (429) - add a GitHub token"
                    : "Error " + r.status
                );
              }
              return r.json();
            })
            .catch(function (err) {
              if (err && err.name === "AbortError") {
                throw new Error("GitHub request timed out. Please try again.");
              }
              throw err;
            })
            .finally(function () {
              clearTimeout(timeoutId);
            });
        },
        fetch: function (url, options, errorMap) {
          return this.request(url, options, errorMap);
        },
        getRateLimit: function () {
          var self = this;
          return this.request(buildGitHubApiUrl(["rate_limit"]))
            .then(function (d) {
              if (d.resources && d.resources.core) {
                self.rateLimit.remaining = d.resources.core.remaining;
                self.rateLimit.limit = d.resources.core.limit;
                self.rateLimit.reset = d.resources.core.reset;
              }
              return self.rateLimit;
            })
            .catch(function () {
              return self.rateLimit;
            });
        },
        getFile: function (o, r, p) {
          return this.fetch(
            buildRepoApiUrl(o, r, ["contents"].concat(splitRepoPath(p)))
          )
            .then(function (d) {
              return d.content ? decodeBase64Utf8(d.content) : null;
            })
            .catch(function () {
              return null;
            });
        },
        getCommits: function (o, r, path, limit) {
          if (this.rateLimit.remaining < 20 && !this.token)
            return Promise.resolve([]); // Skip when rate limited
          return this.fetch(
            buildRepoApiUrl(o, r, ["commits"], {
              per_page: limit || 30,
              path: path || undefined,
            })
          ).catch(function () {
            return [];
          });
        },
        getBlame: function (o, r, path) {
          return this.getCommits(o, r, path, 50)
            .then(function (commits) {
              var authors = {};
              commits.forEach(function (c) {
                var name = c.commit.author.name;
                authors[name] = (authors[name] || 0) + 1;
              });
              return Object.entries(authors)
                .map(function (e) {
                  return {
                    name: e[0],
                    commits: e[1],
                    percent: Math.round((e[1] / commits.length) * 100),
                  };
                })
                .sort(function (a, b) {
                  return b.commits - a.commits;
                });
            })
            .catch(function () {
              return [];
            });
        },
        getPR: function (o, r, prNum) {
          var self = this;
          return this.fetch(buildRepoApiUrl(o, r, ["pulls", String(prNum)]))
            .then(function (pr) {
              return self
                .fetch(buildRepoApiUrl(o, r, ["pulls", String(prNum), "files"]))
                .then(function (files) {
                  pr.files = files;
                  return pr;
                });
            })
            .catch(function () {
              return null;
            });
        },
        // Fast scan using Git Trees API (single request for all files!)
        scanTree: function (o, r, cb, compiledPatterns) {
          var self = this;
          if (cb) cb("Fetching repository tree...");
          // First get repo info to find default branch
          return this.fetch(buildRepoApiUrl(o, r))
            .then(function (repo) {
              var branch = repo.default_branch || "main";
              if (cb) cb("Loading file tree (" + branch + ")...");
              // Get full tree in one request with recursive flag
              return self.fetch(
                buildRepoApiUrl(o, r, ["git", "trees", branch], {
                  recursive: 1,
                })
              );
            })
            .then(function (tree) {
              if (!tree.tree) throw new Error("Invalid tree response");
              var f = [];
              tree.tree.forEach(function (i) {
                if (i.type !== "blob") return;
                var name = i.path.includes("/")
                  ? i.path.substring(i.path.lastIndexOf("/") + 1)
                  : i.path;
                if (shouldExcludeFile(i.path, name, compiledPatterns)) return;
                var pathParts = i.path.split("/");
                var ignored = pathParts.slice(0, -1).some(function (part, idx) {
                  var dirPath = pathParts.slice(0, idx + 1).join("/");
                  return shouldIgnoreDirectory(dirPath, part, compiledPatterns);
                });
                if (ignored) return;
                var folder = i.path.includes("/")
                  ? i.path.substring(0, i.path.lastIndexOf("/"))
                  : "root";
                f.push({
                  path: i.path,
                  name: name,
                  folder: folder,
                  size: i.size || 0,
                  isCode: Parser.isCode(name),
                });
              });
              if (cb) cb("Found " + f.length + " files");
              return f;
            });
        },
        // Fallback: recursive scan using Contents API (many requests)
        scanRecursive: function (o, r, cb, p, d, compiledPatterns) {
          var self = this;
          p = p || "";
          d = d || 0;
          if (d > 10) return Promise.resolve([]);
          return this.fetch(
            buildRepoApiUrl(o, r, ["contents"].concat(splitRepoPath(p)))
          )
            .then(function (c) {
              var f = [];
              var promises = [];
              c.forEach(function (i) {
                if (
                  i.type === "file" &&
                  !shouldExcludeFile(i.path, i.name, compiledPatterns)
                ) {
                  f.push({
                    path: i.path,
                    name: i.name,
                    folder: i.path.includes("/")
                      ? i.path.substring(0, i.path.lastIndexOf("/"))
                      : "root",
                    size: i.size,
                    isCode: Parser.isCode(i.name),
                  });
                } else if (
                  i.type === "dir" &&
                  !shouldIgnoreDirectory(i.path, i.name, compiledPatterns)
                ) {
                  if (cb) cb("/" + i.path);
                  promises.push(
                    self
                      .scanRecursive(o, r, cb, i.path, d + 1, compiledPatterns)
                      .catch(function () {
                        return [];
                      })
                  );
                }
              });
              return Promise.all(promises).then(function (results) {
                results.forEach(function (res) {
                  f = f.concat(res);
                });
                return f;
              });
            })
            .catch(function (e) {
              if (d === 0) throw e;
              return [];
            });
        },
        // Smart scan: try tree API first (1 request), fallback to recursive
        scan: function (o, r, cb, compiledPatterns) {
          var self = this;
          return this.scanTree(o, r, cb, compiledPatterns).catch(function (e) {
            if (cb) cb("Tree API failed, using fallback...");
            return self.scanRecursive(o, r, cb, "", 0, compiledPatterns);
          });
        },
      };

      // ---------------------------------------------------------------------------
      // Shared Analysis Pipeline
      // ---------------------------------------------------------------------------

      function buildTree(files) {
        var root = { name: "root", path: "", children: {}, files: [] };
        files.forEach(function (f) {
          var parts =
            f.folder && f.folder !== "root" ? f.folder.split("/") : [];
          var cur = root;
          parts.forEach(function (p, i) {
            var path = parts.slice(0, i + 1).join("/");
            if (!cur.children[p])
              cur.children[p] = {
                name: p,
                path: path,
                children: {},
                files: [],
              };
            cur = cur.children[p];
          });
          cur.files.push(f);
        });
        return root;
      }

      function countFiles(n) {
        return (
          n.files.length +
          Object.values(n.children).reduce(function (s, c) {
            return s + countFiles(c);
          }, 0)
        );
      }

      async function buildAnalysisData(options) {
        var analyzed = options.analyzed || [];
        var allFns = options.allFns || [];
        var excludePatterns = options.excludePatterns || [];
        var progress =
          typeof options.progress === "function"
            ? options.progress
            : function () {};
        var yieldFn = options.yieldFn || yieldToBrowser;
        var CALL_BATCH = 30;

        progress("Building dependency graph (1/5)...");
        await yieldFn();
        await Parser.prepareTreeSitter(analyzed);
        var fnNames = [
          ...new Set(
            allFns.map(function (f) {
              return f.name;
            })
          ),
        ];
        var fnNameIndex = Parser.buildFunctionNameIndex(fnNames);
        var fnDefLineIndex = Parser.buildFunctionDefLineIndex(allFns);
        var conns = [];
        var fnStats = Object.create(null);

        allFns.forEach(function (fn) {
          if (!fnStats[fn.name]) {
            fnStats[fn.name] = {
              internal: 0,
              external: 0,
              callers: new Map(),
              file: fn.file,
              folder: fn.folder,
              line: fn.line,
              code: fn.code,
              isTopLevel: fn.isTopLevel !== false,
              isExported: fn.isExported || false,
              isClassMethod: fn.isClassMethod || false,
              type: fn.type || "function",
              decorators: fn.decorators || null,
              className: fn.className || null,
            };
          }
        });

        for (var bi = 0; bi < analyzed.length; bi += CALL_BATCH) {
          var batchEnd = Math.min(bi + CALL_BATCH, analyzed.length);
          progress(
            "Analyzing dependencies (2/5)... " +
              batchEnd +
              "/" +
              analyzed.length +
              " files"
          );
          for (var fi = bi; fi < batchEnd; fi++) {
            var file = analyzed[fi];
            if (!file.content) continue;
            var calls = Parser.findCalls(
              file.content,
              fnNames,
              file.path,
              fnDefLineIndex,
              fnNameIndex
            );
            Object.entries(calls).forEach(function (entry) {
              var fn = entry[0],
                cnt = entry[1];
              if (cnt <= 0) return;
              var def = fnStats[fn] ? fnStats[fn].file : null;
              if (!def) return;
              if (def === file.path) {
                fnStats[fn].internal += cnt;
              } else {
                conns.push({
                  source: def,
                  target: file.path,
                  fn: fn,
                  count: cnt,
                });
                var ex = fnStats[fn].callers.get(file.path);
                if (ex) ex.count += cnt;
                else
                  fnStats[fn].callers.set(file.path, {
                    file: file.path,
                    name: file.name,
                    count: cnt,
                  });
                fnStats[fn].external += cnt;
              }
            });
          }
          await yieldFn();
        }
        Object.values(fnStats).forEach(function (s) {
          s.callers = Array.from(s.callers.values());
          s.count = s.internal + s.external;
        });

        progress("Resolving markdown links...");
        await yieldFn();
        var mdAllPaths = analyzed.map(function (f) {
          return f.path;
        });
        analyzed.forEach(function (file) {
          if (!Parser.isMarkdown(file.name)) return;
          file.layer = "note";
          if (!file.content) return;
          var links = Parser.extractMarkdownLinks(file.content);
          var deps = [];
          links.forEach(function (link) {
            var resolved = Parser.resolveMarkdownLink(
              link.target,
              file.path,
              mdAllPaths,
              link.kind
            );
            deps.push({
              kind: link.kind,
              raw: link.raw,
              target: link.target,
              resolved: resolved,
            });
            if (resolved && resolved !== file.path) {
              conns.push({
                source: file.path,
                target: resolved,
                fn: link.raw,
                count: 1,
                kind: link.kind,
              });
            }
          });
          file.dependencies = deps;
        });
        analyzed.forEach(function (f) {
          if (!f.dependencies) f.dependencies = [];
        });

        var issues = [];
        var deadFns = Object.entries(fnStats).filter(function (x) {
          var name = x[0],
            stats = x[1];
          if (stats.internal > 0 || stats.external > 0) return false;
          if (stats.isClassMethod) return false;
          if (!stats.isTopLevel) return false;
          if (stats.decorators && stats.decorators.length > 0) return false;
          if (
            stats.type === "class" ||
            stats.type === "dataclass" ||
            stats.type === "abstract_class"
          )
            return false;
          var baseName = name.includes(".") ? name.split(".").pop() : name;
          if (baseName.startsWith("__") && baseName.endsWith("__"))
            return false;
          if (
            baseName.startsWith("test_") ||
            baseName === "setUp" ||
            baseName === "tearDown" ||
            baseName === "setUpClass" ||
            baseName === "tearDownClass"
          )
            return false;
          if (
            stats.file &&
            (stats.file.includes("test_") ||
              stats.file.includes("_test.") ||
              stats.file.includes("/tests/"))
          )
            return false;
          if (
            (baseName === "upgrade" || baseName === "downgrade") &&
            stats.file &&
            (stats.file.includes("migration") ||
              stats.file.includes("alembic") ||
              stats.file.includes("versions"))
          )
            return false;
          if (
            [
              "main",
              "create_app",
              "make_app",
              "get_app",
              "setup",
              "configure",
              "register",
              "on_startup",
              "on_shutdown",
              "lifespan",
            ].indexOf(baseName) >= 0
          )
            return false;
          if (stats.isExported && stats.file && /\.[jt]sx?$/.test(stats.file))
            return false;
          if (
            stats.file &&
            (/\.(?:spec|test)\.[jt]sx?$/.test(stats.file) ||
              stats.file.includes("__tests__"))
          )
            return false;
          return true;
        });
        if (deadFns.length)
          issues.push({
            type: "warning",
            title: deadFns.length + " Unused Functions",
            desc: "Functions not called from other files",
            items: deadFns.map(function (x) {
              return {
                name: x[0],
                file: x[1].file,
                line: x[1].line,
                code: x[1].code,
              };
            }),
          });

        var godFiles = analyzed.filter(function (f) {
          return f.functions.length > 15;
        });
        if (godFiles.length)
          issues.push({
            type: "critical",
            title: godFiles.length + " Large Files",
            desc: "Files with 15+ functions",
            items: godFiles.map(function (f) {
              return {
                name: f.name + " (" + f.functions.length + " fns)",
                file: f.path,
                fns: f.functions.length,
                lines: f.lines,
              };
            }),
          });

        var coupling = Object.create(null);
        conns.forEach(function (c) {
          coupling[c.target] = (coupling[c.target] || 0) + 1;
        });
        var highCoup = Object.entries(coupling)
          .filter(function (x) {
            return x[1] > 8;
          })
          .sort(function (a, b) {
            return b[1] - a[1];
          });
        if (highCoup.length)
          issues.push({
            type: "warning",
            title: highCoup.length + " Highly Coupled",
            desc: "Files imported by 8+ others",
            items: highCoup.map(function (x) {
              return {
                name: x[0].split("/").pop() + " (" + x[1] + " imports)",
                file: x[0],
                imports: x[1],
              };
            }),
          });

        var connSet = new Set(
          conns.map(function (c) {
            return c.source + "|" + c.target;
          })
        );
        var circular = [];
        conns.forEach(function (c) {
          if (connSet.has(c.target + "|" + c.source)) {
            var key = [c.source, c.target].sort().join("|");
            if (!circular.includes(key)) circular.push(key);
          }
        });
        if (circular.length)
          issues.push({
            type: "critical",
            title: circular.length + " Circular Dependencies",
            desc: "Files that import each other",
            items: circular.map(function (p) {
              var parts = p.split("|");
              return {
                name: parts
                  .map(function (x) {
                    return x.split("/").pop();
                  })
                  .join(" ↔ "),
                files: parts,
              };
            }),
          });

        progress("Detecting patterns (3/5)...");
        await yieldFn();
        var patterns = Parser.detectPatterns(analyzed);
        var securityIssues = Parser.detectSecurity(analyzed);

        progress("Analyzing code quality (4/5)...");
        await yieldFn();
        var duplicates = Parser.detectDuplicates(analyzed, allFns);
        var layerViolations = Parser.detectLayerViolations(analyzed, conns);
        for (var ci = 0; ci < analyzed.length; ci += CALL_BATCH) {
          var cEnd = Math.min(ci + CALL_BATCH, analyzed.length);
          for (var cj = ci; cj < cEnd; cj++) {
            analyzed[cj].complexity =
              analyzed[cj].isCode !== false
                ? Parser.calcComplexity(analyzed[cj].content, analyzed[cj].path)
                : { score: 0, level: "low" };
          }
          if (ci + CALL_BATCH < analyzed.length) await yieldFn();
        }

        progress("Finalizing (5/5)...");
        await yieldFn();
        analyzed.forEach(function (f) {
          f.content = null;
        });

        var folders = [
          ...new Set(
            analyzed.map(function (f) {
              return f.folder;
            })
          ),
        ].sort();
        var tree = buildTree(analyzed);
        var totalLoc = analyzed.reduce(function (s, f) {
          return s + f.lines;
        }, 0);
        var langStats = Object.create(null);
        var parserStats = Object.create(null);
        analyzed.forEach(function (f) {
          var ext = f.name.split(".").pop().toLowerCase();
          langStats[ext] = (langStats[ext] || 0) + f.lines;
          var provenance =
            f.parserProvenance || Parser.getParserProvenance(f.path || f.name);
          f.parserProvenance = provenance;
          parserStats[provenance] = (parserStats[provenance] || 0) + 1;
        });
        var langArray = Object.entries(langStats)
          .sort(function (a, b) {
            return b[1] - a[1];
          })
          .map(function (e) {
            return {
              ext: e[0],
              lines: e[1],
              pct: totalLoc ? Math.round((e[1] / totalLoc) * 100) : 0,
            };
          });
        var parserArray = Object.entries(parserStats)
          .sort(function (a, b) {
            return b[1] - a[1];
          })
          .map(function (e) {
            return { mode: e[0], files: e[1] };
          });

        if (duplicates.length > 0) {
          var nameDups = duplicates.filter(function (d) {
            return d.type === "name";
          });
          var codeDups = duplicates.filter(function (d) {
            return d.type === "code";
          });
          if (nameDups.length)
            issues.push({
              type: "warning",
              title: nameDups.length + " Duplicate Function Names",
              desc: "Same function name in multiple files",
              items: nameDups.map(function (d) {
                return {
                  name: d.name + " (" + d.count + " files)",
                  suggestion: d.suggestion,
                  files: d.files,
                  count: d.count,
                };
              }),
            });
          if (codeDups.length)
            issues.push({
              type: "warning",
              title: codeDups.length + " Similar Code Blocks",
              desc: "Copy-paste code detected",
              items: codeDups.map(function (d) {
                return {
                  name: d.name,
                  suggestion: d.suggestion,
                  files: d.files,
                };
              }),
            });
        }
        if (layerViolations.length > 0) {
          issues.push({
            type: "critical",
            title: layerViolations.length + " Architecture Violations",
            desc: "Lower layers importing from higher layers",
            items: layerViolations.map(function (v) {
              return {
                name: v.fromLayer + " → " + v.toLayer,
                file: v.from,
                toFile: v.to,
                fn: v.fn,
                suggestion: v.suggestion,
              };
            }),
          });
        }
        var highComplexity = analyzed
          .filter(function (f) {
            return f.complexity && f.complexity.level === "critical";
          })
          .sort(function (a, b) {
            return b.complexity.score - a.complexity.score;
          });
        if (highComplexity.length)
          issues.push({
            type: "warning",
            title: highComplexity.length + " High Complexity Files",
            desc: "Files with complexity score >30",
            items: highComplexity.map(function (f) {
              return {
                name: f.name + " (" + f.complexity.score + ")",
                file: f.path,
                score: f.complexity.score,
                lines: f.lines,
              };
            }),
          });

        var dataObj = {
          files: analyzed,
          functions: allFns,
          connections: conns,
          fnStats: fnStats,
          folders: folders,
          tree: tree,
          issues: issues,
          patterns: patterns,
          securityIssues: securityIssues,
          duplicates: duplicates,
          layerViolations: layerViolations,
          deadFunctions: deadFns.map(function (x) {
            var codeLines = x[1].code ? x[1].code.split("\n").length : 0;
            return {
              name: x[0],
              file: x[1].file,
              folder: x[1].folder,
              line: x[1].line,
              code: x[1].code,
              codeLines: codeLines,
              ext: x[1].file.split(".").pop(),
            };
          }),
          excludePatterns: excludePatterns,
          stats: {
            files: analyzed.length,
            functions: allFns.length,
            connections: conns.length,
            dead: deadFns.length,
            patterns: patterns.length,
            security: securityIssues.filter(function (i) {
              return i.severity === "high";
            }).length,
            duplicates: duplicates.length,
            violations: layerViolations.length,
            loc: totalLoc,
            languages: langArray,
            parserModes: parserArray,
          },
        };
        dataObj.suggestions = Parser.generateSuggestions(dataObj);
        return dataObj;
      }
        // ---------------------------------------------------------------------------
      // Inline Worker Runtime
      // ---------------------------------------------------------------------------

      var analysisWorkerSourcePromise = null;

      function createAnalysisWorkerSource() {
        if (analysisWorkerSourcePromise) return analysisWorkerSourcePromise;
        analysisWorkerSourcePromise = fetch(window.location.href, {
          cache: "no-store",
        })
          .then(function (response) {
            if (!response.ok) throw new Error("Unable to load analyzer source");
            return response.text();
          })
          .then(function (html) {
            // Build markers via concatenation so they don't match themselves in the slice.
            var startMarker = "// ===== VIEW REPO_" + "ANALYZER_START =====";
            var endMarker = "// ===== VIEW REPO_" + "ANALYZER_END =====";
            var parserStart = html.indexOf(startMarker);
            var parserEnd = html.indexOf(endMarker, parserStart);
            if (parserStart < 0 || parserEnd < 0)
              throw new Error("Analyzer source markers missing");
            var analyzerSource = html.slice(parserStart, parserEnd);
            return [
              "self.window=self;",
              'function getSecurityScanContent(file){return file&&file.content?file.content:"";}',
              "function isSanitizedPreviewRenderer(){return false;}",
              "function yieldToBrowser(){return Promise.resolve();}",
              'try{importScripts("https://cdnjs.cloudflare.com/ajax/libs/acorn/8.11.3/acorn.min.js");}catch(e){}',
              'try{importScripts("https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js");}catch(e){}',
              'try{importScripts("https://cdn.jsdelivr.net/npm/web-tree-sitter@0.20.8/tree-sitter.js");}catch(e){}',
              analyzerSource,
              "self.onmessage=async function(event){",
              "  var payload=event.data||{};",
              "  try{",
              "    var data=await buildAnalysisData({",
              "      analyzed:payload.analyzed||[],",
              "      allFns:payload.allFns||[],",
              "      excludePatterns:payload.excludePatterns||[],",
              '      progress:function(message){self.postMessage({type:"progress",message:message});},',
              "      yieldFn:function(){return Promise.resolve();}",
              "    });",
              '    self.postMessage({type:"done",data:data});',
              "  }catch(error){",
              '    self.postMessage({type:"error",message:error&&error.message?error.message:String(error)});',
              "  }",
              "};",
            ].join("\n");
          });
        return analysisWorkerSourcePromise;
      }

      function runAnalysisData(options) {
        if (
          typeof Worker === "undefined" ||
          typeof Blob === "undefined" ||
          typeof URL === "undefined"
        ) {
          return buildAnalysisData(options);
        }
        return createAnalysisWorkerSource()
          .then(function (workerSource) {
            return new Promise(function (resolve, reject) {
              var workerUrl = URL.createObjectURL(
                new Blob([workerSource], { type: "text/javascript" })
              );
              var worker = new Worker(workerUrl);
              var settled = false;
              function cleanup() {
                worker.terminate();
                URL.revokeObjectURL(workerUrl);
              }
              worker.onmessage = function (event) {
                var message = event.data || {};
                if (message.type === "progress") {
                  if (typeof options.progress === "function")
                    options.progress(message.message);
                  return;
                }
                settled = true;
                cleanup();
                if (message.type === "done") resolve(message.data);
                else
                  reject(
                    new Error(message.message || "Worker analysis failed")
                  );
              };
              worker.onerror = function (error) {
                if (settled) return;
                settled = true;
                cleanup();
                reject(
                  error && error.message
                    ? new Error(error.message)
                    : new Error("Worker analysis failed")
                );
              };
              worker.postMessage({
                analyzed: options.analyzed || [],
                allFns: options.allFns || [],
                excludePatterns: options.excludePatterns || [],
              });
            });
          })
          .catch(function () {
            return buildAnalysisData(options);
          });
      }
